<div class="container mt-4">

<div class="d-flex justify-content-between mb-3">

<h3>Student Task List</h3>

<button class="btn btn-warning" routerLink="/taskadd">
Add Task
</button>

</div>

<table class="table table-bordered table-hover">

<thead class="table-dark">

<tr>

<th>#</th>
<th>Task Name</th>
<th>Subject</th>
<th>Deadline</th>
<th>Status</th>
<th>Action</th>

</tr>

</thead>

<tbody>

<tr *ngFor="let task of tasks; let i=index">

<td>{{i+1}}</td>
<td>{{task.taskname}}</td>
<td>{{task.subject}}</td>
<td>{{task.deadline}}</td>
<td>{{task.status}}</td>

<td>

<button class="btn btn-warning btn-sm me-2"
[routerLink]="['/taskedit',task.taskid]">

Edit

</button>

<button class="btn btn-danger btn-sm"
(click)="deleteTask(task.taskid)">

Delete

</button>

</td>

</tr>

</tbody>

</table>

</div>
